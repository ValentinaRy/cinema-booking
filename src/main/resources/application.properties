spring.application.name=cinema-booking

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:cinemadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Auto-create tables from entity classes
spring.jpa.hibernate.ddl-auto=create-drop

# H2 web console to browse data while running
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Access to database through browser: http://localhost:8080/h2-console, with the URL jdbc:h2:mem:cinemadb